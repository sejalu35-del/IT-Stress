<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg rounded-4 p-4 text-center">
        <h2 class="mb-4">🧠 Stress Prediction Result</h2>

        <div class="alert alert-info fs-4 fw-bold">
            {{ result }}
        </div>

        <div class="my-4">
            <img src="data:image/png;base64,{{ plot_url }}" alt="Stress Graph" class="img-fluid rounded shadow">
        </div>

        <a href="{{ url_for('checking') }}" class="btn btn-success btn-lg mt-3">
            🔄 Check Another
        </a>
    </div>
</div>

</body>
</html>
